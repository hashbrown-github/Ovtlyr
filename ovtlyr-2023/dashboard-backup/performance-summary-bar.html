  Highcharts.chart('performance_chart', {
    chart: {
      type: 'column',
    },
    title: { text: null },

    xAxis: {
      type: 'datetime',
      min: xMin,
      max: xMax,
      ordinal: true, // optional: disables automatic gap filling
      labels: {
        formatter: function () {
          return Highcharts.dateFormat('%b %e, %Y', this.value);
        },
        style: { fontSize: '10px', color: '#808191' }
      }
    },
    yAxis: [
      {
        title: { text: null },
        top: '0%',
        height: '100%',
        offset: 1,
        lineWidth: 1,
        labels: {
          style: { fontSize: '10px', color: '#808191' }
        }
      },
      {
        title: { text: null },
        top: '0%',
        height: '100%',
        offset: 1,
        lineWidth: 1,
        labels: {
          style: { fontSize: '10px', color: '#808191' }
        }
      }
    ],



    plotOptions: {
      column: {
        grouping: true,
        groupPadding: 0.05,
        pointPadding: 0,
        borderWidth: 0
      }
    },

    credits: { enabled: false },
    legend: { enabled: true },


    series: [
      {
        name: 'Close Price', // <--- important
        data: columnData,
        color: '#000000',
        yAxis: 0,
        showInLegend: false, // hide from legend
        tooltip: { enabled: true },
        states: {
          hover: { enabled: false },
          select: { enabled: false },
          inactive: { enabled: false }
        }
      },

      {
        name: 'Trading Period',
        data: per_summary,
        color: '#19A7CE',
        showInLegend: true,
        tooltip: { enabled: true },
        yAxis: 1,
        states: {
          hover: { enabled: false },
          select: { enabled: false },
          inactive: { enabled: false }
        },
      }
    ],
    tooltip: {
      shared: true,
      formatter: function () {
        let s = `<b>${Highcharts.dateFormat('%b %e, %Y', this.x)}</b>`;
        this.points.forEach(point => {
          s += `<br/><span style="color:${point.color}">\u25CF</span> ${point.series.name}: ${point.y}`;
        });
        return s;
      }
    }
  });

</script>
</body>
</html>
